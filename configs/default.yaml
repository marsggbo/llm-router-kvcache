models:
  weak: "Qwen/Qwen2.5-7B-Instruct"
  strong: "Qwen/Qwen2.5-14B-Instruct"

serving:
  weak_url: "http://localhost:30000"
  strong_url: "http://localhost:30001"

router:
  # Options: random | always_weak | always_strong | routellm
  type: "routellm"

  # RouteLLM pretrained backbone (weights auto-downloaded from HuggingFace):
  #   bert_gpt4      → routellm/bert_gpt4_augmented      (0.3B, recommended)
  #   bert_mmlu      → routellm/bert_mmlu_augmented       (0.3B, MMLU-tuned)
  #   mf_gpt4        → routellm/mf_gpt4_augmented         (lightweight MF)
  #   causal_llm_gpt4→ routellm/causal_llm_gpt4_augmented (8B, highest accuracy)
  routellm_model: "bert_gpt4"

  threshold: 0.5                # P(strong needed) threshold; higher → more strong-model traffic
  task_aware_affinity: false    # Phase 3: route same-task requests to same instance

benchmark:
  num_requests: 500
  concurrency: 16
  max_new_tokens: 256
  request_timeout: 120

datasets:
  mmlu:
    num_shots: 5
    subjects: null              # null = all 57 subjects
    split: "test"
  sharegpt:
    path: "data/sharegpt.json"
    max_turns: 1                # Use first turn only for single-round routing
  wildbench:
    split: "test"
    max_samples: 500
