# Task-aware routing config: 3 instances of the same model, each dedicated to a task type.
# All instances run Qwen3-4B — quality is identical, the only variable is
# cache management strategy (random dispatch vs task-aware affinity).
#
# Task distribution designed for ~equal load:
#
#   WildBench v2 (500 req sampled):
#     coding:  wildbench_coding(~170) + wildbench_information(~182) ≈ 352
#     math:    wildbench_math(~87)  + wildbench_reasoning(~273)    ≈ 360
#     general: wildbench_creative(~258) + wildbench_advice(~21)
#              + wildbench_data_analysis(~33)                       ≈ 312
#
#   MMLU (300 req sampled):
#     coding:  mmlu_humanities(~65)
#     math:    mmlu_stem(~95) + mmlu_social_sciences(~60)          ≈ 155
#     general: mmlu_other(~65) + fallback                          ≈  80

instances:
  - name: "coding"
    model: "Qwen/Qwen3-4B"
    url: "http://localhost:30000"
    task_types: ["coding", "wildbench_coding",
                 "wildbench_information",
                 "mmlu_humanities"]

  - name: "math"
    model: "Qwen/Qwen3-4B"
    url: "http://localhost:30001"
    task_types: ["math", "wildbench_math", "wildbench_reasoning",
                 "mmlu_stem", "mmlu_social_sciences"]

  - name: "general"
    model: "Qwen/Qwen3-4B"
    url: "http://localhost:30002"
    task_types: []   # handles creative, advice, data_analysis, other, mmlu_other

router:
  type: "task_aware"
  load_balance_threshold: 8

benchmark:
  num_requests: 500
  concurrency: 16
  max_new_tokens: 256
  request_timeout: 120

datasets:
  wildbench:
    split: "test"
    max_samples: 500
    use_system_prompt: true
  mmlu:
    num_shots: 5
    subjects: null
    split: "test"
    max_samples: 300
